<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Padel KingZ</title>
    <link rel="stylesheet" href="style/main.css">
    <link rel="stylesheet" href="style/pages.css">
</head>
<body class="adminPage">
    <header>
        <a href="index.html"><h1 class="headerText">Padel KingZ</h1></a>
        <nav>
            <button><a href="schedule.html">Schedule</a></button>
            <button><a href="register.html">Register</a></button>
            <button><a href="admin-login.html">Admin</a></button>
        </nav>
    </header>

    <main class="pageShell">
        <section class="pageCard" style="max-width: 34rem; margin: 0 auto;">
            <h2 class="pageTitle">Admin Login</h2>
            <p class="pageSubtitle">Frontend-only placeholder. No authentication logic is implemented.</p>
            <form>
                <div class="formGrid">
                    <div class="field fieldFull">
                        <label for="adminEmail">Admin Email</label>
                        <input id="adminEmail" type="email" placeholder="admin@padelkingz.com">
                    </div>
                    <div class="field fieldFull">
                        <label for="adminPassword">Password</label>
                        <input id="adminPassword" type="password" placeholder="Enter password">
                    </div>
                </div>
                <div class="actionRow">
                    <a class="actionBtn" href="admin.html">Log In</a>
                    <a class="actionBtn actionBtnAlt" href="index.html">Cancel</a>
                </div>
            </form>
        </section>
    </main>

    <section class="adminMobileNotice">
        <h2 class="pageTitle">Desktop Only</h2>
        <p class="pageSubtitle">Admin pages are only available on desktop.</p>
        <a class="actionBtn" href="index.html">Back to Home</a>
    </section>
</body>
</html>
